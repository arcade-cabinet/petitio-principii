name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1 — release-please opens/maintains a release PR; when that PR is
  # merged, it emits a tag. This job is a no-op on non-release commits.
  # ─────────────────────────────────────────────────────────────────────────
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.3.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 2 — when a release tag fires, build versioned artifacts and attach
  # them to the GitHub Release. Each job gates on release-please having
  # actually emitted a release on this run. Outputs from the release-please
  # action are trusted strings (tag name + semver version, no user content).
  # ─────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build web bundle
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (GITHUB_PAGES=true — matches cd.yml base path)
        run: pnpm build
        env:
          GITHUB_PAGES: "true"

      - name: Zip web bundle
        run: |
          cd dist
          zip -r "../petitio-principii-${VERSION}-web.zip" .

      - name: Attach to release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ env.TAG }}
          files: petitio-principii-${{ env.VERSION }}-web.zip

  build-android:
    name: Build Android APK
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle (CAPACITOR=true)
        run: pnpm build
        env:
          CAPACITOR: "true"

      - name: Sync web bundle into Android project
        run: npx cap sync android

      # Release-signing materials — T73 wires these in via GitHub Secrets.
      # Until then, build a debug APK so v0.1.0 at least ships an installable
      # sideload target. The job still fires and the debug artifact attaches.
      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "petitio-principii-${VERSION}-android-debug.apk"

      - name: Attach APK to release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ env.TAG }}
          files: petitio-principii-${{ env.VERSION }}-android-debug.apk

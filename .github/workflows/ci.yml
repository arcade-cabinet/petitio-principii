name: CI

on:
  pull_request:
  # `pull_request` is intentionally suppressed by GitHub for PRs opened by
  # github-actions[bot] (loop-prevention). release-please opens PRs as that
  # bot, so its release PRs would otherwise never run CI and would stay
  # UNSTABLE forever. `pull_request_target` fires for bot-opened PRs; we
  # explicitly check out the PR head SHA below so the proposed changes are
  # validated, not the base branch. Safe because release-please always opens
  # from a branch in this repo (never an external fork).
  pull_request_target:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (mirrors `pnpm verify` locally)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Validate the PR head SHA, not the base — required because
          # `pull_request_target` defaults to checking out the base ref.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Mirrors `pnpm verify` locally: check → typecheck → test → build.
      - name: Verify
        run: pnpm verify

  android-apk:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Produce the web bundle with relative asset paths so the Android
      # WebView (file://) can load it.
      - name: Build web bundle (CAPACITOR=true)
        run: pnpm build
        env:
          CAPACITOR: "true"

      # The android/ Gradle project is committed; `cap sync` just copies
      # the freshly-built dist/ bundle into android/app/src/main/assets/
      # and refreshes native plugin registrations.
      - name: Sync web bundle into Android project
        run: npx cap sync android

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: petitio-principii-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

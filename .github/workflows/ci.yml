name: CI

on:
  pull_request:
  # `pull_request` is intentionally suppressed by GitHub for PRs opened by
  # github-actions[bot] (loop-prevention). release-please opens PRs as that
  # bot, so its release PRs would otherwise never run CI and would stay
  # UNSTABLE forever. `pull_request_target` fires for bot-opened PRs.
  # Job-level `if:` below scopes this trigger to release-please branches
  # only, so human-opened same-repo PRs don't double-trigger CI.
  pull_request_target:
    branches:
      - main

permissions:
  contents: read

# concurrency.group must include the PR number, not just `github.ref`,
# because `pull_request_target` resolves `github.ref` to the BASE branch
# (`refs/heads/main`) — using `github.ref` alone would cancel every CI
# run on every release-please PR. The PR number falls back to the ref
# for any non-PR events.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (mirrors `pnpm verify` locally)
    runs-on: ubuntu-latest
    # Run for all `pull_request` events. For `pull_request_target`, only
    # run on release-please bot PRs — that's the only event this trigger
    # exists to handle. Same-repo human PRs use the regular `pull_request`
    # event and skip this job under `pull_request_target` to avoid
    # double-triggering. The `startsWith` gate also closes the security
    # surface for arbitrary fork PRs (we'd want a different model entirely
    # before allowing those — out of scope here).
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' &&
       startsWith(github.head_ref, 'release-please--'))
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # For `pull_request_target` (release-please bot), explicitly check
          # out the PR head SHA so the proposed changes are validated, not
          # the base branch. For regular `pull_request`, leaving `ref` empty
          # uses the default merge ref (`refs/pull/.../merge`) which catches
          # merge-commit failures the head SHA alone would miss.
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Mirrors `pnpm verify` locally: check → typecheck → test → build.
      - name: Verify
        run: pnpm verify

  android-apk:
    name: Android debug APK
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' &&
       startsWith(github.head_ref, 'release-please--'))
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Produce the web bundle with relative asset paths so the Android
      # WebView (file://) can load it.
      - name: Build web bundle (CAPACITOR=true)
        run: pnpm build
        env:
          CAPACITOR: "true"

      # The android/ Gradle project is committed; `cap sync` just copies
      # the freshly-built dist/ bundle into android/app/src/main/assets/
      # and refreshes native plugin registrations.
      - name: Sync web bundle into Android project
        run: npx cap sync android

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: petitio-principii-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
